{% extends "base.html" %}

{% block content %}
<head>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        <script>
        const messages = {{ messages | safe }};
        messages.forEach(msg => alert(msg));
        </script>
    {% endif %}
{% endwith %}

<div class="container my-5" id="mainDiv" style="position: relative;">
    
    <!-- Particle field outside the card -->
    <div class="particles-field" id="particleField"></div>

    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card shadow p-4 frosted">
                <!-- Logo -->
                <img class="logo mb-3" src="{{ url_for('static', filename='logo.svg') }}" alt="PolicyEdge Logo" width="330" height="75">

                <!-- Login Form -->
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>
                </form>

                <div class="mt-3 text-center">
                    <a href="{{ url_for('register') }}">Create an account</a>
                </div>
            </div>
        </div>
    </div>
</div>


<script>
    const particleField = document.getElementById('particleField');
    for (let i = 0; i < 50; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.setProperty('--x', `${Math.random() * 200 - 100}px`);
        particle.style.setProperty('--y', `${Math.random() * 200 - 100}px`);
        particle.style.animation = `particleFloat ${1 + Math.random() * 2}s infinite`;
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        particleField.appendChild(particle);
    }
</script>

<!-- Bootstrap 5 JS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
